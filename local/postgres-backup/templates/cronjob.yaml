apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-postgres-backup
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: postgres-backup
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backup
spec:
  schedule: {{ .Values.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: postgres-backup
            app.kubernetes.io/instance: {{ .Release.Name }}
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
          containers:
            - name: backup
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  
                  TIMESTAMP=$(date +%Y-%m-%d_%H-%M-%S)
                  BACKUP_DIR="/backups"
                  RETENTION_DAYS={{ .Values.backup.retentionDays }}
                  
                  echo "[INFO] Starting PostgreSQL backup..."
                  echo "[INFO] Database: $POSTGRES_DB"
                  echo "[INFO] Host: $POSTGRES_HOST:$POSTGRES_PORT"
                  
                  # Perform backup
                  BACKUP_FILE="${BACKUP_DIR}/${POSTGRES_DB}_${TIMESTAMP}.dump"
                  
                  pg_dump \
                    -h "$POSTGRES_HOST" \
                    -p "$POSTGRES_PORT" \
                    -U "$POSTGRES_USER" \
                    -d "$POSTGRES_DB" \
                    -Fc \
                    --no-owner \
                    --no-acl \
                    -f "$BACKUP_FILE"
                  
                  # Compress
                  gzip -f "$BACKUP_FILE"
                  
                  echo "[INFO] Backup completed: ${BACKUP_FILE}.gz"
                  echo "[INFO] Size: $(du -h ${BACKUP_FILE}.gz | cut -f1)"
                  
                  # Cleanup old backups
                  echo "[INFO] Cleaning up backups older than $RETENTION_DAYS days..."
                  find "$BACKUP_DIR" -name "*.dump.gz" -type f -mtime +$RETENTION_DAYS -delete -print || true
                  
                  # List current backups
                  echo "[INFO] Current backups:"
                  ls -lh "$BACKUP_DIR"/*.dump.gz 2>/dev/null || echo "No backups found"
                  
                  echo "[INFO] Backup completed successfully!"
              env:
                - name: POSTGRES_HOST
                  value: {{ .Values.postgresql.host | quote }}
                - name: POSTGRES_PORT
                  value: {{ .Values.postgresql.port | quote }}
                - name: POSTGRES_DB
                  value: {{ .Values.postgresql.database | quote }}
                - name: POSTGRES_USER
                  value: {{ .Values.postgresql.user | quote }}
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.postgresql.existingSecret }}
                      key: {{ .Values.postgresql.secretKey }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-backup-pvc
