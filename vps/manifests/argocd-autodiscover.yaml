# =============================================================================
# Argo CD ApplicationSet - Auto-Discovery
# Automatically discovers and deploys applications from SCM repositories
# =============================================================================
#
# Generated from template. Do not edit directly.
# Edit vps/config.env and run: ./vps/apply-config.sh
#
# =============================================================================

---
# Secret containing SCM token for API access
# Set via: sudo ./vps/export-secrets.sh set-github-token
apiVersion: v1
kind: Secret
metadata:
    name: scm-token
    namespace: argocd
    labels:
        app.kubernetes.io/name: argocd-autodiscover
type: Opaque
stringData:
    token: ""  # Set via kubectl or SealedSecret

---
# ApplicationSet - Alpha environments (develop branch)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
    name: autodiscover-alpha
    namespace: argocd
spec:
    generators:
        -   scmProvider:
                github:
                    organization: coterie-app
                    tokenRef:
                        secretName: scm-token
                        key: token
                    allBranches: false
                cloneProtocol: https
                filters:
                    -   pathsExist:
                            - helm/*/values-alpha.yaml

    template:
        metadata:
            name: "{{repository}}-alpha"
            namespace: argocd
            labels:
                app.kubernetes.io/name: "{{repository}}"
                app.kubernetes.io/environment: alpha
                app.kubernetes.io/managed-by: argocd-autodiscover
            annotations:
                argocd-image-updater.argoproj.io/image-list: "app=ghcr.io/coterie-app/{{repository}}"
                argocd-image-updater.argoproj.io/app.update-strategy: latest
                argocd-image-updater.argoproj.io/app.allow-tags: "regexp:^(develop|[a-f0-9]{7,40})$"
                argocd-image-updater.argoproj.io/write-back-method: argocd
        spec:
            project: default
            source:
                repoURL: "{{url}}"
                targetRevision: develop
                path: helm/{{repository}}
                helm:
                    valueFiles:
                        - values.yaml
                        - values-alpha.yaml
                    parameters:
                        -   name: image.repository
                            value: "ghcr.io/coterie-app/{{repository}}"
                        -   name: image.tag
                            value: develop
            destination:
                server: https://kubernetes.default.svc
                namespace: "{{repository}}-alpha"
            syncPolicy:
                automated:
                    prune: true
                    selfHeal: true
                syncOptions:
                    - CreateNamespace=true

---
# ApplicationSet - Production environments (main branch)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
    name: autodiscover-prod
    namespace: argocd
spec:
    generators:
        -   scmProvider:
                github:
                    organization: coterie-app
                    tokenRef:
                        secretName: scm-token
                        key: token
                    allBranches: false
                cloneProtocol: https
                filters:
                    -   pathsExist:
                            - helm/*/values-prod.yaml

    template:
        metadata:
            name: "{{repository}}-prod"
            namespace: argocd
            labels:
                app.kubernetes.io/name: "{{repository}}"
                app.kubernetes.io/environment: prod
                app.kubernetes.io/managed-by: argocd-autodiscover
            annotations:
                argocd-image-updater.argoproj.io/image-list: "app=ghcr.io/coterie-app/{{repository}}"
                argocd-image-updater.argoproj.io/app.update-strategy: latest
                argocd-image-updater.argoproj.io/app.allow-tags: "regexp:^(latest|v?[0-9]+\\.[0-9]+\\.[0-9]+.*)$"
                argocd-image-updater.argoproj.io/write-back-method: argocd
        spec:
            project: default
            source:
                repoURL: "{{url}}"
                targetRevision: main
                path: helm/{{repository}}
                helm:
                    valueFiles:
                        - values.yaml
                        - values-prod.yaml
                    parameters:
                        -   name: image.repository
                            value: "ghcr.io/coterie-app/{{repository}}"
                        -   name: image.tag
                            value: latest
            destination:
                server: https://kubernetes.default.svc
                namespace: "{{repository}}-prod"
            syncPolicy:
                syncOptions:
                    - CreateNamespace=true
