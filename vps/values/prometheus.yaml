# =============================================================================
# Prometheus Minimal Configuration for VPS (4-6GB RAM)
# Optimized for low memory footprint
# =============================================================================

# Prometheus Server
server:
  # Resource limits
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

  # Persistent storage
  persistentVolume:
    enabled: true
    size: 5Gi
    storageClass: ""

  # Retention settings (7 days to save disk space)
  retention: "7d"
  retentionSize: "4GB"

  # Security context
  securityContext:
    runAsUser: 65534
    runAsNonRoot: true
    runAsGroup: 65534
    fsGroup: 65534

  # Global scrape configuration
  global:
    scrape_interval: 30s
    evaluation_interval: 30s

  # Extra scrape configs - auto-discover pods with prometheus annotations
  extraScrapeConfigs: |
    # Auto-discover application pods with prometheus.io annotations
    - job_name: 'kubernetes-pods'
      kubernetes_sd_configs:
        - role: pod
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
          action: replace
          target_label: __address__
          regex: (.+);(.+)
          replacement: $2:$1
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          action: replace
          target_label: pod
    
    # PostgreSQL Exporter
    - job_name: 'postgresql'
      static_configs:
        - targets: ['postgresql-metrics.storage.svc.cluster.local:9187']
          labels:
            service: postgresql

# =============================================================================
# Alerting rules - delivered via serverFiles so Prometheus picks them up
# Each rule is intentionally simple, fires on conditions we couldn't detect during
# the 2026-05-18 coterie-webapp-alpha incident (25 833 restarts in 48 days).
# =============================================================================
serverFiles:
  alerting_rules.yml:
    groups:
      - name: kubernetes-pods
        interval: 30s
        rules:
          - alert: KubePodCrashLooping
            expr: |
              max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}[5m]) >= 1
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"
              description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been in CrashLoopBackOff for at least 5 minutes. Run `kubectl logs -n {{ $labels.namespace }} {{ $labels.pod }} --previous` to inspect the last crash."

          - alert: KubeContainerWaiting
            expr: |
              sum by (namespace, pod, container) (kube_pod_container_status_waiting_reason{reason!="ContainerCreating"}) > 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Container {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }} is waiting"
              description: "Container has been waiting for >10m. Reason: see kube_pod_container_status_waiting_reason in Prometheus."

          - alert: KubePodOOMKilled
            expr: |
              kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} was OOMKilled"
              description: "Container {{ $labels.container }} was killed by the OOM killer. Consider raising resources.limits.memory or fixing a memory leak."

          - alert: KubePodNotReady
            expr: |
              sum by (namespace, pod) (max by (namespace, pod) (kube_pod_status_phase{phase=~"Pending|Unknown|Failed"}) * on(namespace, pod) group_left(owner_kind) (max by (namespace, pod, owner_kind) (kube_pod_owner{owner_kind!="Job"}))) > 0
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not Ready for >15m"
              description: "Pod is stuck in a non-Running phase. Inspect with `kubectl describe pod -n {{ $labels.namespace }} {{ $labels.pod }}`."

          - alert: KubeDeploymentReplicasMismatch
            expr: |
              (kube_deployment_spec_replicas != kube_deployment_status_replicas_available)
              and (changes(kube_deployment_status_replicas_updated[10m]) == 0)
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} replicas mismatch"
              description: "Spec replicas != available replicas for >15m with no rollout progress. Likely a failing image or crash loop."

          - alert: KubeJobFailed
            expr: kube_job_failed > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Job {{ $labels.namespace }}/{{ $labels.job_name }} failed"
              description: "Job failed. If it is a migration PreSync hook, the next ArgoCD sync will not progress until this is fixed."

          - alert: KubeContainerHighRestartRate
            expr: |
              rate(kube_pod_container_status_restarts_total[15m]) * 60 > 1
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Container {{ $labels.namespace }}/{{ $labels.pod }} restarting >1/min"
              description: "Container has restarted more than once per minute averaged over 15m. Likely a flapping pod."

      - name: node-health
        interval: 30s
        rules:
          - alert: NodeMemoryPressure
            expr: |
              (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.10
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ $labels.instance }} memory available <10%"
              description: "Available memory dropped below 10% for >5m. Workloads may be OOMKilled imminently."

          - alert: NodeDiskPressure
            expr: |
              (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.*"} / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.*"}) < 0.10
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} <10% free"
              description: "Risk of pod evictions and PostgreSQL/Loki write failures."

# =============================================================================
# Alertmanager - lightweight, no receivers configured by default
# Add Discord/Slack/email webhook in alertmanagerFiles to send notifications.
# See vps/docs/observability.md for the Discord webhook recipe.
# =============================================================================
alertmanager:
  enabled: true
  persistentVolume:
    enabled: true
    size: 1Gi
    storageClass: ""
  resources:
    requests:
      memory: "32Mi"
      cpu: "10m"
    limits:
      memory: "64Mi"
      cpu: "50m"
  securityContext:
    runAsUser: 65534
    runAsNonRoot: true
    runAsGroup: 65534
    fsGroup: 65534

alertmanagerFiles:
  alertmanager.yml:
    global:
      resolve_timeout: 5m
    route:
      receiver: 'null'
      group_by: ['alertname', 'severity', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      # Override per-severity by uncommenting and adding a webhook receiver below.
      # routes:
      #   - matchers: [ severity="critical" ]
      #     receiver: 'discord'
      #     continue: true
    receivers:
      - name: 'null'
      # - name: 'discord'
      #   webhook_configs:
      #     - url: 'https://discord.com/api/webhooks/REPLACE_WITH_REAL_ID/REPLACE_WITH_REAL_TOKEN/slack'
      #       send_resolved: true
    inhibit_rules:
      - source_matchers: [ severity="critical" ]
        target_matchers: [ severity="warning" ]
        equal: [ alertname, namespace ]

# Pushgateway (disabled to save resources)
pushgateway:
  enabled: false

# Node Exporter (useful for VPS monitoring)
nodeExporter:
  enabled: true
  resources:
    requests:
      memory: "32Mi"
      cpu: "25m"
    limits:
      memory: "64Mi"
      cpu: "100m"

# Kube State Metrics (useful but optional)
kube-state-metrics:
  enabled: true
  resources:
    requests:
      memory: "32Mi"
      cpu: "25m"
    limits:
      memory: "64Mi"
      cpu: "100m"

# ConfigMap reload (for dynamic config updates)
configmapReload:
  prometheus:
    enabled: true
    resources:
      requests:
        memory: "16Mi"
        cpu: "10m"
      limits:
        memory: "32Mi"
        cpu: "50m"

# Service accounts
serviceAccounts:
  server:
    create: true
  nodeExporter:
    create: true
