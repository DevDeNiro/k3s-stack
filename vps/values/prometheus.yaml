# =============================================================================
# Prometheus Minimal Configuration for VPS (4-6GB RAM)
# Optimized for low memory footprint
# =============================================================================

# Prometheus Server
server:
  # Resource limits
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

  # Persistent storage
  persistentVolume:
    enabled: true
    size: 5Gi
    storageClass: ""

  # Retention settings (7 days to save disk space)
  retention: "7d"
  retentionSize: "4GB"

  # Security context
  securityContext:
    runAsUser: 65534
    runAsNonRoot: true
    runAsGroup: 65534
    fsGroup: 65534

  # Global scrape configuration
  global:
    scrape_interval: 30s
    evaluation_interval: 30s

  # Extra scrape configs - auto-discover pods with prometheus annotations
  extraScrapeConfigs: |
    # Auto-discover application pods with prometheus.io annotations
    - job_name: 'kubernetes-pods'
      kubernetes_sd_configs:
        - role: pod
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
          action: replace
          target_label: __address__
          regex: (.+);(.+)
          replacement: $2:$1
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          action: replace
          target_label: pod
    
    # PostgreSQL Exporter
    - job_name: 'postgresql'
      static_configs:
        - targets: ['postgresql-metrics.storage.svc.cluster.local:9187']
          labels:
            service: postgresql

# =============================================================================
# Alerting rules - delivered via serverFiles so Prometheus picks them up
# Each rule is intentionally simple, fires on conditions we couldn't detect during
# the 2026-05-18 coterie-webapp-alpha incident (25 833 restarts in 48 days).
# =============================================================================
serverFiles:
  alerting_rules.yml:
    groups:
      - name: kubernetes-pods
        interval: 30s
        rules:
          - alert: KubePodCrashLooping
            expr: |
              max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}[5m]) >= 1
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"
              description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been in CrashLoopBackOff for at least 5 minutes. Run `kubectl logs -n {{ $labels.namespace }} {{ $labels.pod }} --previous` to inspect the last crash."

          - alert: KubeContainerWaiting
            expr: |
              sum by (namespace, pod, container) (kube_pod_container_status_waiting_reason{reason!="ContainerCreating"}) > 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Container {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }} is waiting"
              description: "Container has been waiting for >10m. Reason: see kube_pod_container_status_waiting_reason in Prometheus."

          - alert: KubePodOOMKilled
            expr: |
              kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} was OOMKilled"
              description: "Container {{ $labels.container }} was killed by the OOM killer. Consider raising resources.limits.memory or fixing a memory leak."

          - alert: KubePodNotReady
            expr: |
              sum by (namespace, pod) (max by (namespace, pod) (kube_pod_status_phase{phase=~"Pending|Unknown|Failed"}) * on(namespace, pod) group_left(owner_kind) (max by (namespace, pod, owner_kind) (kube_pod_owner{owner_kind!="Job"}))) > 0
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not Ready for >15m"
              description: "Pod is stuck in a non-Running phase. Inspect with `kubectl describe pod -n {{ $labels.namespace }} {{ $labels.pod }}`."

          - alert: KubeDeploymentReplicasMismatch
            expr: |
              (kube_deployment_spec_replicas != kube_deployment_status_replicas_available)
              and (changes(kube_deployment_status_replicas_updated[10m]) == 0)
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} replicas mismatch"
              description: "Spec replicas != available replicas for >15m with no rollout progress. Likely a failing image or crash loop."

          - alert: KubeJobFailed
            expr: kube_job_failed > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Job {{ $labels.namespace }}/{{ $labels.job_name }} failed"
              description: "Job failed. If it is a migration PreSync hook, the next ArgoCD sync will not progress until this is fixed."

          - alert: KubeContainerHighRestartRate
            expr: |
              rate(kube_pod_container_status_restarts_total[15m]) * 60 > 1
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Container {{ $labels.namespace }}/{{ $labels.pod }} restarting >1/min"
              description: "Container has restarted more than once per minute averaged over 15m. Likely a flapping pod."

      - name: node-health
        interval: 30s
        rules:
          - alert: NodeMemoryPressure
            expr: |
              (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.10
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ $labels.instance }} memory available <10%"
              description: "Available memory dropped below 10% for >5m. Workloads may be OOMKilled imminently."

          - alert: NodeDiskPressure
            expr: |
              (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.*"} / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.*"}) < 0.10
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} <10% free"
              description: "Risk of pod evictions and PostgreSQL/Loki write failures."

      # ====================================================================
      # Application-level rules (ported from coterie-webapp/docker/observability/alert_rules.yml)
      # These complement the K8s/node rules above with app-specific signals.
      # All metrics are tagged `application` by Micrometer (ObservabilityConfiguration.kt)
      # and `namespace` by the kubernetes-pods Prometheus scrape job, so each alert
      # naturally fires once per (application, namespace) pair (alpha + prod).
      # ====================================================================
      - name: app-latency
        interval: 30s
        rules:
          - alert: HighP95Latency
            expr: |
              histogram_quantile(
                0.95,
                sum by (le, application, namespace, uri) (
                  rate(http_server_requests_seconds_bucket{application="coterie-webapp"}[5m])
                )
              ) > 0.5
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High P95 latency on {{ $labels.namespace }} {{ $labels.uri }}"
              description: "P95 latency is {{ $value | printf \"%.2f\" }}s (threshold: 500ms) on {{ $labels.application }} ({{ $labels.namespace }})."

          - alert: CriticalP99Latency
            expr: |
              histogram_quantile(
                0.99,
                sum by (le, application, namespace, uri) (
                  rate(http_server_requests_seconds_bucket{application="coterie-webapp"}[5m])
                )
              ) > 1
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Critical P99 latency on {{ $labels.namespace }} {{ $labels.uri }}"
              description: "P99 latency is {{ $value | printf \"%.2f\" }}s (threshold: 1s) on {{ $labels.application }} ({{ $labels.namespace }})."

          - alert: SlowDatabaseQueries
            expr: |
              rate(r2dbc_pool_acquire_seconds_sum{application="coterie-webapp"}[5m])
              /
              rate(r2dbc_pool_acquire_seconds_count{application="coterie-webapp"}[5m]) > 0.1
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Slow DB connection acquisition on {{ $labels.namespace }}"
              description: "Average connection acquire time is {{ $value | printf \"%.2f\" }}s on {{ $labels.application }} ({{ $labels.namespace }})."

      - name: app-errors
        interval: 30s
        rules:
          - alert: HighErrorRate
            expr: |
              sum by (application, namespace) (
                rate(http_server_requests_seconds_count{application="coterie-webapp", status=~"5.."}[5m])
              )
              /
              sum by (application, namespace) (
                rate(http_server_requests_seconds_count{application="coterie-webapp"}[5m])
              ) > 0.01
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High HTTP 5xx error rate on {{ $labels.namespace }}"
              description: "5xx rate is {{ $value | humanizePercentage }} (threshold: 1%) on {{ $labels.application }} ({{ $labels.namespace }})."

          - alert: CriticalErrorRate
            expr: |
              sum by (application, namespace) (
                rate(http_server_requests_seconds_count{application="coterie-webapp", status=~"5.."}[5m])
              )
              /
              sum by (application, namespace) (
                rate(http_server_requests_seconds_count{application="coterie-webapp"}[5m])
              ) > 0.05
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Critical HTTP 5xx error rate on {{ $labels.namespace }}"
              description: "5xx rate is {{ $value | humanizePercentage }} (threshold: 5%) on {{ $labels.application }} ({{ $labels.namespace }})."

          - alert: ExternalServiceFailures
            expr: sum by (application, namespace) (rate(coterie_external_send_email_failure_total[5m])) > 0.1
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "Email service failures on {{ $labels.namespace }}"
              description: "{{ $value | printf \"%.2f\" }} email failures/s on {{ $labels.namespace }}."

      - name: app-availability
        interval: 30s
        rules:
          # We rely on KubePodCrashLooping / KubePodNotReady from the kubernetes-pods group above
          # for pod-level availability. This rule catches the case where the scrape itself fails
          # (pod is up but /actuator/prometheus is unreachable) - usually a misconfigured probe.
          - alert: AppScrapeDown
            expr: |
              up{job="kubernetes-pods", namespace=~"coterie-webapp-.*"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Prometheus cannot scrape {{ $labels.namespace }}/{{ $labels.pod }}"
              description: "Pod is up but /actuator/prometheus is unreachable for >1m. Check the actuator endpoint config or the NetworkPolicy."

      - name: app-resilience
        interval: 30s
        rules:
          - alert: CircuitBreakerOpen
            expr: resilience4j_circuitbreaker_state{state="open", application="coterie-webapp"} == 1
            for: 0s
            labels:
              severity: critical
            annotations:
              summary: "Circuit breaker {{ $labels.name }} OPEN on {{ $labels.namespace }}"
              description: "Circuit breaker {{ $labels.name }} has tripped on {{ $labels.application }} ({{ $labels.namespace }}). Requests are being rejected."

          - alert: CircuitBreakerHalfOpen
            expr: resilience4j_circuitbreaker_state{state="half_open", application="coterie-webapp"} == 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Circuit breaker {{ $labels.name }} stuck HALF_OPEN on {{ $labels.namespace }}"
              description: "Circuit breaker has been half-open for 5m on {{ $labels.application }} ({{ $labels.namespace }}). May indicate flapping."

          - alert: HighRetryRate
            expr: |
              sum by (application, namespace) (
                rate(resilience4j_retry_calls_total{application="coterie-webapp", kind="retry"}[5m])
              )
              /
              sum by (application, namespace) (
                rate(resilience4j_retry_calls_total{application="coterie-webapp"}[5m])
              ) > 0.1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High retry rate on {{ $labels.namespace }}"
              description: "{{ $value | humanizePercentage }} of calls are retries on {{ $labels.application }} ({{ $labels.namespace }}) (threshold: 10%)."

      - name: app-saturation
        interval: 30s
        rules:
          - alert: ConnectionPoolExhausted
            expr: r2dbc_pool_pending{application="coterie-webapp"} > 5
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "R2DBC pool has pending requests on {{ $labels.namespace }}"
              description: "{{ $value }} requests waiting for a connection on {{ $labels.application }} ({{ $labels.namespace }})."

          - alert: ConnectionPoolCritical
            expr: |
              r2dbc_pool_acquired{application="coterie-webapp"}
              /
              r2dbc_pool_max_allocated{application="coterie-webapp"} > 0.9
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "R2DBC pool near exhaustion on {{ $labels.namespace }}"
              description: "Pool is {{ $value | humanizePercentage }} utilized on {{ $labels.application }} ({{ $labels.namespace }})."

          - alert: HighJvmMemoryUsage
            expr: |
              jvm_memory_used_bytes{application="coterie-webapp", area="heap"}
              /
              jvm_memory_max_bytes{application="coterie-webapp", area="heap"} > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High JVM heap on {{ $labels.namespace }}/{{ $labels.pod }}"
              description: "Heap usage is {{ $value | humanizePercentage }} on {{ $labels.application }} ({{ $labels.namespace }})."

# =============================================================================
# Alertmanager - lightweight, no receivers configured by default
# Add Discord/Slack/email webhook in alertmanagerFiles to send notifications.
# See vps/docs/observability.md for the Discord webhook recipe.
# =============================================================================
alertmanager:
  enabled: true
  persistentVolume:
    enabled: true
    size: 1Gi
    storageClass: ""
  resources:
    requests:
      memory: "32Mi"
      cpu: "10m"
    limits:
      memory: "64Mi"
      cpu: "50m"
  securityContext:
    runAsUser: 65534
    runAsNonRoot: true
    runAsGroup: 65534
    fsGroup: 65534
  # Mount the Discord webhook URL as a file so it never appears in plaintext in the values.yaml.
  # The Secret is created by `vps/scripts/setup-secrets.sh set-discord-webhook` (key: webhook-url).
  # The Alertmanager config below references the file via `url_file:`.
  extraSecretMounts:
    - name: alertmanager-discord-webhook
      mountPath: /etc/alertmanager/secrets/discord
      subPath: ""
      secretName: alertmanager-discord-webhook
      readOnly: true
      optional: true  # don't crashloop Alertmanager if the secret hasn't been created yet

alertmanagerFiles:
  alertmanager.yml:
    global:
      resolve_timeout: 5m
    route:
      # Default: drop everything (acts as a safety net for unrouted alerts).
      receiver: 'null'
      group_by: ['alertname', 'severity', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        # Critical and warning go to Discord. If the secret isn't mounted yet, the
        # send will fail and Alertmanager will keep retrying without crashing - the
        # alert still surfaces in the Alertmanager UI.
        - matchers:
            - severity =~ "critical|warning"
          receiver: 'discord'
          continue: false
    receivers:
      - name: 'null'
      - name: 'discord'
        webhook_configs:
          # Discord supports Slack-compatible webhook payloads via the `/slack` suffix.
          # Store ONLY the full URL (incl. /slack) in the Secret under key `webhook-url`.
          - url_file: /etc/alertmanager/secrets/discord/webhook-url
            send_resolved: true
            max_alerts: 0
    inhibit_rules:
      - source_matchers: [ severity="critical" ]
        target_matchers: [ severity="warning" ]
        equal: [ alertname, namespace ]

# Pushgateway (disabled to save resources)
pushgateway:
  enabled: false

# Node Exporter (useful for VPS monitoring)
nodeExporter:
  enabled: true
  resources:
    requests:
      memory: "32Mi"
      cpu: "25m"
    limits:
      memory: "64Mi"
      cpu: "100m"

# Kube State Metrics (useful but optional)
kube-state-metrics:
  enabled: true
  resources:
    requests:
      memory: "32Mi"
      cpu: "25m"
    limits:
      memory: "64Mi"
      cpu: "100m"

# ConfigMap reload (for dynamic config updates)
configmapReload:
  prometheus:
    enabled: true
    resources:
      requests:
        memory: "16Mi"
        cpu: "10m"
      limits:
        memory: "32Mi"
        cpu: "50m"

# Service accounts
serviceAccounts:
  server:
    create: true
  nodeExporter:
    create: true
