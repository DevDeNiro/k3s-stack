# =============================================================================
# Grafana Minimal Configuration for VPS (4-6GB RAM)
# Optimized for low memory footprint with Prometheus datasource
# =============================================================================

# Admin credentials - managed via Kubernetes Secret (created by setup-secrets.sh)
admin:
  existingSecret: grafana-secret
  userKey: admin-user
  passwordKey: admin-password

# Resource limits
resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "200m"

# Persistent storage
persistence:
  enabled: true
  size: 2Gi
  storageClassName: ""

# Security context
securityContext:
  runAsUser: 472
  runAsGroup: 472
  fsGroup: 472

# Service configuration
service:
  type: ClusterIP
  port: 80

# Ingress (configure host after deployment)
ingress:
  enabled: false
  # Enable and configure after installation:
  # hosts:
  #   - grafana.yourdomain.com
  # ingressClassName: nginx

# Datasources auto-provisioning
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-server.monitoring.svc.cluster.local
        isDefault: true
        editable: false
        jsonData:
          httpMethod: POST
          manageAlerts: true
          prometheusType: Prometheus
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        isDefault: false
        editable: false
        jsonData:
          maxLines: 1000
          # Derived fields can be added later to link traces from log lines
          # (e.g. extract trace_id from log line and link to Tempo).
      - name: Alertmanager
        type: alertmanager
        access: proxy
        url: http://prometheus-alertmanager.monitoring.svc.cluster.local
        isDefault: false
        editable: false
        jsonData:
          implementation: prometheus

# Dashboard providers
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default
      # Add custom dashboard providers for your applications:
      # - name: 'myapp'
      #   orgId: 1
      #   folder: 'MyApp'
      #   type: file
      #   disableDeletion: false
      #   editable: true
      #   options:
      #     path: /var/lib/grafana/dashboards/myapp

# Pre-configured dashboards from Grafana.com
# Added 2026-05 after the coterie-webapp-alpha postmortem: we need dashboards
# focused on pod restarts, container states, and centralized logs.
dashboards:
  default:
    # Kubernetes cluster monitoring
    kubernetes-cluster:
      gnetId: 6417
      revision: 1
      datasource: Prometheus
    # Node Exporter Full
    node-exporter:
      gnetId: 1860
      revision: 37
      datasource: Prometheus
    # PostgreSQL Database
    postgresql:
      gnetId: 9628
      revision: 7
      datasource: Prometheus
    # Kubernetes / Views / Pods - restart counts, container states, memory/CPU per pod
    # https://grafana.com/grafana/dashboards/15760
    kubernetes-pods:
      gnetId: 15760
      revision: 36
      datasource: Prometheus
    # Kubernetes / Views / Global - cluster-wide overview with health badges
    # https://grafana.com/grafana/dashboards/15757
    kubernetes-global:
      gnetId: 15757
      revision: 43
      datasource: Prometheus
    # Logs / App - LogQL-powered log explorer per namespace/pod
    # https://grafana.com/grafana/dashboards/13639
    loki-logs:
      gnetId: 13639
      revision: 2
      datasource: Loki
    # Alertmanager overview
    # https://grafana.com/grafana/dashboards/9578
    alertmanager:
      gnetId: 9578
      revision: 4
      datasource: Prometheus

# Grafana configuration
grafana.ini:
  server:
    root_url: "%(protocol)s://%(domain)s/grafana"
    serve_from_sub_path: true
  analytics:
    check_for_updates: false
    reporting_enabled: false
  log:
    mode: console
    level: info
  security:
    disable_gravatar: true
  users:
    allow_sign_up: false
    auto_assign_org: true
    auto_assign_org_role: Viewer

# RBAC
rbac:
  create: true
  pspEnabled: false

# Service account
serviceAccount:
  create: true

# Pod labels
podLabels:
  app: grafana
  component: monitoring
  environment: vps

# Liveness/Readiness probes
livenessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 60
  timeoutSeconds: 30
  failureThreshold: 10

readinessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 30
  timeoutSeconds: 10
